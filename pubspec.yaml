name: comsats_merit_calculator
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.1

dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  # Assets must be defined under the flutter block here:
  assets:
    - img/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "img/COMSATS-University-logo.png"
  min_sdk_android: 21