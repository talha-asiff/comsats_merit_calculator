name: comsats_merit_calculator
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.1

dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.0 # Check pub.dev for the latest version

flutter:
  uses-material-design: true
  # Assets must be defined under the flutter block here:
  assets:
    - img/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "img/COMSATS-University-logo.png"
  min_sdk_android: 21

flutter_native_splash:
  # The path to your splash image (must be transparent PNG)
  image: img/splash.png
  # Background color of the splash screen (hex format)
  color: "#ffffff"
  # Set to true to fill the screen (Android 12+ compatibility)
  fullscreen: true
android_12:
    image: assets/splash.png 
    color: "#ffffff"